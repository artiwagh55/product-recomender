services:
  - type: web
    name: smartshop-ai
    runtime: python
    repo: https://github.com/YOUR_USERNAME/smartshop-ai
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0