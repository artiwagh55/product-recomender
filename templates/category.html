<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category }} Products - SmartShop AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .card-image { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .card-price { font-size: 1.3rem; font-weight: 700; color: #667eea; }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="header">
            <h1><i class="fas fa-tag"></i> {{ category }} Products</h1>
            <p>Browse our collection of {{ category }}</p>
        </div>
        <div class="products-grid">
            {% for product in products %}
            <div class="product-card" onclick="window.location.href='/'">
                <img src="{{ product.image_url }}" class="card-image">
                <div class="card-content">
                    <div class="card-title">{{ product.name }}</div>
                    <div class="card-price">{{ product.price }}</div>
                    <div class="card-rating">
                        {% for i in range(5) %}
                            {% if i < product.rating|int %}
                                <i class="fas fa-star" style="color: #ffc107;"></i>
                            {% else %}
                                <i class="far fa-star" style="color: #ffc107;"></i>
                            {% endif %}
                        {% endfor %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
